services:

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # passed into init-databases.sh
      SYNAPSE_DB_PASSWORD: ${SYNAPSE_DB_PASSWORD}
      KEYCLOAK_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Matrix Synapse ────────────────────────────────────────
  synapse:
    image: matrixdotorg/synapse:latest
    restart: unless-stopped
    env_file: .env
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    volumes:
      - synapse-data:/data
      - ./synapse/homeserver.yaml.template:/homeserver.yaml.template:ro
      - ./synapse/log.config:/data/log.config:ro
      - ./synapse/entrypoint.sh:/entrypoint.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -fsSL http://localhost:8008/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── coturn TURN/STUN server ───────────────────────────────
  coturn:
    image: coturn/coturn:latest
    restart: unless-stopped
    env_file: .env
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    volumes:
      - ./coturn/turnserver.conf.template:/turnserver.conf.template:ro
      - ./coturn/entrypoint.sh:/entrypoint.sh:ro
      - certbot-certs:/etc/letsencrypt:ro
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "5349:5349/udp"
      - "5349:5349/tcp"
      - "49152-49200:49152-49200/udp"
    networks:
      - internal

  # ── Keycloak ──────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    restart: unless-stopped
    env_file: .env
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HOSTNAME: ${KEYCLOAK_DOMAIN}
      KC_PROXY: edge
      KC_PROXY_HEADERS: "xforwarded"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_RELATIVE_PATH: "/"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
    command: start
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/9000 && printf \"GET /health/ready HTTP/1.0\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q UP'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── Nginx reverse proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    env_file: .env
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/entrypoint.sh:/entrypoint.sh:ro
      # mounted as .template so nginx's own template processing never touches it
      - ./nginx/default.conf.template:/etc/nginx/conf.d/default.conf.template:ro
      - certbot-certs:/etc/letsencrypt:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - synapse
      - keycloak
    networks:
      - internal

  # ── Certbot (initial issuance + renewal loop) ────────────
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
      - ./certbot/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]

volumes:
  postgres-data:
  synapse-data:
  certbot-certs:
  certbot-webroot:

networks:
  internal:
    driver: bridge
